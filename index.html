<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meus Objetivos</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header>
    <h1>🎯 Meus Objetivos do Ano</h1>
    <p>Acompanhe seu progresso em tempo real</p>
  </header>

  <main class="grid">

    <!-- OBJETIVO 1 -->
    <div class="card">
      <h2>📘 Estudar JavaScript</h2>
      <p>Finalizar curso completo</p>
      <div class="timer" id="timer1"></div>
      <div class="bar"><div class="progress" id="p1"></div></div>
    </div>

    <!-- OBJETIVO 2 -->
    <div class="card">
      <h2>💻 Criar projetos</h2>
      <p>Fazer 5 projetos reais</p>
      <div class="timer" id="timer2"></div>
      <div class="bar"><div class="progress" id="p2"></div></div>
    </div>

    <!-- OBJETIVO 3 -->
    <div class="card">
      <h2>🌐 Portfólio</h2>
      <p>Publicar site profissional</p>
      <div class="timer" id="timer3"></div>
      <div class="bar"><div class="progress" id="p3"></div></div>
    </div>

    <!-- OBJETIVO 4 -->
    <div class="card">
      <h2>🚀 Conseguir estágio</h2>
      <p>Aplicar para vagas</p>
      <div class="timer" id="timer4"></div>
      <div class="bar"><div class="progress" id="p4"></div></div>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
