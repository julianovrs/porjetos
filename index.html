<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Objetivos do Ano</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Meus Objetivos do ano</h1>

    <!-- Abas -->
    <div class="tabs">
      <button class="tab active" onclick="abrirAba('cursos')">Cursos</button>
      <button class="tab" onclick="abrirAba('projetos')">Projetos</button>
      <button class="tab" onclick="abrirAba('portfolio')">Portfólio</button>
    </div>

    <!-- Conteúdo -->
    <div class="content">

      <div id="cursos" class="aba ativa">
        <h2>Estudar 4 cursos</h2>
        <p>Tempo restante:</p>
        <div class="timer" id="timer"></div>
      </div>

      <div id="projetos" class="aba">
        <h2>Criar projetos em JavaScript</h2>
      </div>

      <div id="portfolio" class="aba">
        <h2>Criar portfólio</h2>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
